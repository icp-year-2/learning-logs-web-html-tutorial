      <!-- ============================================================
           TODO 11: Build the Content — Search + Topic Items (+50 XP)
           ============================================================
           Inside <main class="content">, build TWO sections:

           1. Search bar (class="search"):
              - A <form> containing:
                - <label for="search">Topic: </label>
                - <input type="text" name="search" placeholder="Search..." />
                - <button type="submit">SEARCH</button>

           2. Topic container (class="topicContainer"):
              - A <ul> containing ONE <li class="topicItem"> with:
                a) Topic link:
                   <a class="topic" href="#">1. Python Course</a>
                b) Edit link:
                   <a class="edit" href="#">Edit</a>
                c) Delete form (uses POST method with hidden inputs):
                   <form action="topic" method="post">
                     <input type="hidden" name="action" value="delete" />
                     <input type="hidden" name="topicid" value="topic.id" />
                     <button class="submit" type="submit"
                       onclick="return confirm('Are you sure you want to delete?');">
                       Delete
                     </button>
                   </form>

           NEW CONCEPTS:
           - <input type="hidden"> sends data without showing it to the user
           - onclick="return confirm(...)" shows a Yes/No popup before deleting
           - method="post" sends data securely (not in the URL)
           - The edit link uses GET (just navigates), delete uses POST (modifies data)

           The complete content structure:

             <main class="content">
               <div class="search">
                 <form action="">
                   <label for="search">Topic: </label>
                   <input type="text" name="search" placeholder="Search..." />
                   <button type="submit">SEARCH</button>
                 </form>
               </div>
               <div class="topicContainer">
                 <ul>
                   <li class="topicItem">
                     <a class="topic" href="#">1. Python Course</a>
                     <a class="edit" href="#">Edit</a>
                     <form action="topic" method="post">
                       <input type="hidden" name="action" value="delete" />
                       <input type="hidden" name="topicid" value="topic.id" />
                       <button class="submit" type="submit"
                         onclick="return confirm('Are you sure you want to delete?');">
                         Delete
                       </button>
                     </form>
                   </li>
                 </ul>
               </div>
             </main>

           🏆 Badge: Lister — earned when TODOs 10-11 are complete!
