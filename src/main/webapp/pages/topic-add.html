  <head>

      <!-- ============================================================
           TODO 13: Build the Form Content (+25 XP)
           ============================================================
           Inside <main class="content">, build a form for adding a topic:

           1. Topic container (class="topicContainer"):
              - A <form action=""> containing:
                a) Input row (class="topicItem"):
                   - <label for="">Topic: </label>
                   - <input type="text" placeholder="Topic Name" name="topic" />
                b) Submit section (class="submit"):
                   - <button type="submit">Save</button>

           NEW CONCEPTS:
           - <label> describes what the input is for (accessibility)
           - name="topic" is the key sent to the server (Week 4)
           - placeholder shows hint text inside the input
           - <form action=""> will be filled in Week 4 with a servlet URL

           The complete content structure:

             <main class="content">
               <div class="topicContainer">
                 <form action="">
                   <div class="topicItem">
                     <label for="">Topic: </label>
                     <input type="text" placeholder="Topic Name" name="topic" />
                   </div>
                   <div class="submit">
                     <button type="submit">Save</button>
                   </div>
                 </form>
               </div>
             </main>

           🏆 Badge: Form Builder — earned when TODOs 12-13 are complete!
           ============================================================ -->
      <main class="content">
